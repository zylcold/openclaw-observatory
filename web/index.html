<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="observatory-build-id" content="%VITE_BUILD_ID%" />
    <meta name="observatory-required-api-version" content="3" />
    <meta name="observatory-required-capability" content="timeseries-v3" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0d11" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f6f9" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Real-time monitoring dashboard for OpenClaw Gateway" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Observatory" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon.svg" color="#26d6a2" />
    <title>OpenClaw Observatory</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
